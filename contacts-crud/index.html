    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid container-xl">
            <div class="d-flex align-items-center gap-2">
                <div class="bg-purple p-3 rounded-4"><i class="fa-solid fa-contact-book text-white fs-5"></i></div>
                <div>
                    <h2 class="fs-4 fw-bold m-0">Contact<span class="text-purple">Hub</span></h2>
                    <p class="text-secondary m-0 small d-none d-sm-inline-block">Smart Contact Manager</p>
                </div>
            </div>
            <div class="d-flex align-items-center gap-1 gap-sm-4">
                <button class="add-btn bg-purple border-0 px-3 py-2 text-white rounded-3" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
            <i class="fa-solid fa-plus pe-4"></i>Add <span class="d-none d-sm-inline-block">Contact</span>
          </button>
                <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-scrollable">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h1 class="modal-title fs-5" id="staticBackdropLabel">Add New Contact</h1>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body pt-4">
                                <div class="bg-primary rounded-circle mx-auto d-flex align-items-center justify-content-center mb-3">
                                    <i class="fa-solid fa-user text-white fs-4"></i>
                                </div>
                                <label for="change-photo" class="btn bg-secondary bg-opacity-10 mb-4 d-flex align-items-center justify-content-center fit-content mx-auto">
                    <i class="fa-solid fa-camera"></i> Change Photo
                    <input type="file" accept="image/*" class="d-none" id="change-photo" />
                  </label>
                                <form class="p-3">
                                    <div class="mb-1 w-100">
                                        <label for="fullName" class="form-label small">Full Name <span class="text-danger fw-bold">*</span></label
                      >
                      <input
                        type="text"
                        class="form-control bg-secondary bg-opacity-10 py-2"
                        id="fullName"
                        placeholder="Enter full name" />
                    </div>
                    <div class="mb-1 w-100">
                      <label for="phoneNumber" class="form-label small"
                        >Phone Number <span class="text-danger fw-bold">*</span></label
                      >
                      <input
                        type="number"
                        class="form-control bg-secondary bg-opacity-10 py-2"
                        id="phoneNumber"
                        placeholder="e.g., 01012345678" />
                    </div>
                    <div class="mb-1 w-100">
                      <label for="emailAddress" class="form-label small">Email Address</label>
                                        <input type="email" class="form-control bg-secondary bg-opacity-10 py-2" id="emailAddress" placeholder="name@example.com" />
                                    </div>
                                    <div class="mb-1 w-100">
                                        <label for="Address" class="form-label small">Address</label>
                                        <input type="text" class="form-control bg-secondary bg-opacity-10 py-2" id="Address" placeholder="Enter Address" />
                                    </div>
                                    <div class="mb-1 w-100">
                                        <label class="small pb-2" for="Group">Group</label>
                                        <select class="form-select bg-secondary bg-opacity-10 py-2" id="Group" aria-label="Default select example">
                        <option value="select-group" selected class="d-none" disabled>Select a group</option>
                        <option value="Family">Family</option>
                        <option value="Friends">Friends</option>
                        <option value="Work">Work</option>
                        <option value="School">School</option>
                        <option value="Other">Other</option>
                      </select>
                                    </div>
                                    <div class="mb-1 w-100">
                                        <label for="Notes" class="form-label">Notes</label>
                                        <textarea placeholder="Add notes about this contact" class="form-control bg-secondary bg-opacity-10" id="Notes" rows="3"></textarea>
                                    </div>

                                    <div>
                                        <label for="fav">Favorite</label>
                                        <input type="checkbox" id="fav" />
                                        <br />
                                        <label for="">Emarg</label>
                                        <input type="checkbox" id="emarg" />
                                    </div>
                                </form>
                            </div>
                            <div class="d-flex">
                                <div class="p-2 col-6">
                                    <button type="button" class="btn bg-secondary bg-opacity-10 w-100" data-bs-dismiss="modal">
                      Cansel
                    </button>
                                </div>
                                <div style="color: yellow" class="p-2 col-6">
                                    <button id="addBtn" data-bs-dismiss="modal" onclick="addContact()" class="bg-purple d-block border-0 px-3 py-2 text-white rounded-3 w-100">
                      <i class="fa-solid fa-check pe-4"></i>Save Contact
                    </button>
                                    <button id="updateBtn" data-bs-dismiss="modal" onclick="updateContact()" class="bg-purple d-none border-0 px-3 py-2 text-white rounded-3 w-100">
                      <i class="fa-solid fa-check pe-4"></i>Update Contact
                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="navicon">
                    <i class="fa-solid fa-bell text-secondary d-none d-sm-inline-block"></i>
                </div>
                <div class="navicon">
                    <i class="fa-solid fa-gear text-secondary d-none d-sm-inline-block"></i>
                </div>
                <div>
                    <img src="images/navbar-icon.jpg" alt="navbar image" class="rounded-3" />
                </div>
            </div>
        </div>
